<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil del Administrador • CityRepair</title>
  <link rel="stylesheet" href="../src/css/styles.css">
  <link rel="stylesheet" href="../src/css/perfil-admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

  <header class="perfil-navbar">
    <div class="perfil-navbar-brand">
      <img src="../src/img/favicon.png" class="perfil-logo" alt="">
      <div>
        <span class="brand-title">CityRepair</span>
        <span class="brand-sub">Sistema de Reportes EDET</span>
      </div>
    </div>
    <nav class="perfil-navbar-actions">
      <a class="btn-nav" href="./edet-dashboard.html">
        <i class="bi bi-speedometer2"></i> Gestión
      </a>
      <button class="btn-nav btn-nav--logout" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
      </button>
    </nav>
  </header>

  <main class="perfil-container">

    <div class="perfil-card">

      <div class="perfil-avatar-wrap">
        <div class="perfil-avatar" id="perfilAvatar">A</div>
        <div class="perfil-avatar-badge">
          <i class="bi bi-shield-check-fill"></i>
        </div>
      </div>

      <h2 class="perfil-nombre" id="perfilNombre">Administrador</h2>

      <p class="perfil-email">
        <i class="bi bi-envelope-fill"></i>
        <span id="perfilEmail"></span>
      </p>

      <span class="perfil-rol">
        <i class="bi bi-shield-check"></i> Administrador EDET
      </span>

      <div class="perfil-divider"></div>

      <div class="perfil-info-grid">
        <div class="perfil-info-item">
          <i class="bi bi-building"></i>
          <div>
            <span class="info-label">Empresa</span>
            <span class="info-value">EDET S.A.</span>
          </div>
        </div>
        <div class="perfil-info-item">
          <i class="bi bi-geo-alt-fill"></i>
          <div>
            <span class="info-label">Región</span>
            <span class="info-value">Tucumán, Argentina</span>
          </div>
        </div>
        <div class="perfil-info-item">
          <i class="bi bi-person-badge-fill"></i>
          <div>
            <span class="info-label">Rol</span>
            <span class="info-value">Administrador del sistema</span>
          </div>
        </div>
      </div>

      <a href="./edet-dashboard.html" class="btn-ir-dashboard">
        <i class="bi bi-speedometer2"></i> Ir al Dashboard
      </a>

    </div>

  </main>

  <script type="module" src="../src/js/perfil-admin.js"></script>

  <script>
    function cerrarSesion() {
      localStorage.removeItem("cr_auth");
      window.location.href = "./login.html";
    }
  </script>

</body>
</html>
