<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión EDET • CityRepair</title>

  <link rel="stylesheet" href="../src/css/styles.css">
  <link rel="stylesheet" href="../src/css/edet-dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<header class="edet-navbar">
  <div class="edet-navbar-brand">
    <div class="avatar-sm">E</div>
    <div class="brand-txt">
      <span class="brand-title">CityRepair</span>
      <span class="brand-sub">Panel de Gestión EDET</span>
    </div>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <a href="./perfil-admin.html" class="btn-perfil">
      <i class="bi bi-person-circle"></i> Perfil
    </a>
    <button class="btn-logout" onclick="cerrarSesion()">
      🚪 Cerrar sesión
    </button>
  </div>
</header>

<main class="container edash">

  <h1 class="edash-title">Panel de Gestión EDET</h1>

  <!-- KPIs -->
  <section class="edash-kpis">
    <article class="kpi">
      <div class="kpi-num" id="kpiTotal">0</div>
      <div class="kpi-sub">Total Reportes</div>
    </article>
    <article class="kpi">
      <div class="kpi-num kpi-num--green" id="kpiOk">0</div>
      <div class="kpi-sub">Resueltos</div>
    </article>
    <article class="kpi">
      <div class="kpi-num kpi-num--blue" id="kpiReview">0</div>
      <div class="kpi-sub">En Revisión</div>
    </article>
    <article class="kpi">
      <div class="kpi-num kpi-num--red" id="kpiHigh">0</div>
      <div class="kpi-sub">Alta Prioridad</div>
    </article>
  </section>

  <!-- FILTROS -->
  <section class="filtros-section">
    <div class="filtros-header">
      <span class="filtros-title">⚙️ Filtros Avanzados</span>
    </div>

    <div class="filtros-grid">

      <div class="filtro-item">
        <label>Estado</label>
        <select id="filtroResolucion" class="select">
          <option value="todos">Todos</option>
          <option value="resuelto">Resueltos</option>
          <option value="no_resuelto">No resueltos</option>
        </select>
      </div>

      <div class="filtro-item">
        <label>Prioridad</label>
        <select id="filtroPrioridad" class="select">
          <option value="todos">Todas</option>
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>

      <div class="filtro-item">
        <label>Tipo de problema</label>
        <select id="filtroTipo" class="select">
          <option value="todos">Todos</option>
          <option value="corte-total">Corte de luz total</option>
          <option value="baja-tension">Baja tensión / corte intermitente</option>
          <option value="poste-danado">Poste dañado / inclinado</option>
          <option value="cable-caido">Cable caído / suelto</option>
          <option value="medidor-quemado">Medidor quemado</option>
          <option value="luminaria-publica">Luminaria pública apagada</option>
          <option value="transformador-riesgo">Transformador con ruido / olor raro</option>
          <option value="obra-cercana">Obra cerca de cables</option>
          <option value="otros">Otros problemas eléctricos</option>
        </select>
      </div>

      <div class="filtro-item">
        <label>Ciudad / Zona</label>
        <select id="filtroZona" class="select">
          <option value="todos">Todas</option>
          <option value="Banda del Río Salí">Banda del Río Salí</option>
          <option value="Burruyacu">Burruyacu</option>
          <option value="Chicligasta">Chicligasta</option>
          <option value="Cruz Alta">Cruz Alta</option>
          <option value="Famailla">Famailla</option>
          <option value="Graneros">Graneros</option>
          <option value="Juan Bautista Alberdi">Juan Bautista Alberdi</option>
          <option value="La Cocha">La Cocha</option>
          <option value="Leales">Leales</option>
          <option value="Lules">Lules</option>
          <option value="Monteros">Monteros</option>
          <option value="Rio Chico">Rio Chico</option>
          <option value="San Miguel de Tucumán">San Miguel de Tucumán</option>
          <option value="Simoca">Simoca</option>
          <option value="Tafi del Valle">Tafi del Valle</option>
          <option value="Tafí Viejo">Tafí Viejo</option>
          <option value="Trancas">Trancas</option>
          <option value="Yerba Buena">Yerba Buena</option>
        </select>
      </div>

      <div class="filtro-item">
        <label>Fecha desde</label>
        <input type="date" id="fechaDesde" class="select">
      </div>

      <div class="filtro-item">
        <label>Fecha hasta</label>
        <input type="date" id="fechaHasta" class="select">
      </div>

    </div>

    <div class="filtros-actions">
      <button id="btnAplicarFiltros" class="btn-primary">🔍 Aplicar filtros</button>
      <button id="btnLimpiarFiltros" class="btn-secondary">✖ Limpiar</button>
      <button id="btnExportarPDF" class="btn-export">📄 Exportar PDF</button>
    </div>
  </section>

  <!-- GRÁFICOS -->
  <section class="edash-charts">
    <article class="card">
      <header class="card-head">Estado de Reportes</header>
      <div class="chart-wrapper">
        <canvas id="chartStatus"></canvas>
      </div>
    </article>

    <article class="card">
      <header class="card-head">Reportes por Zona</header>
      <div class="chart-wrapper">
        <canvas id="chartZones"></canvas>
      </div>
    </article>
  </section>

  <!-- LISTADO -->
  <section class="card">
    <header class="card-head">Listado de Reportes</header>
    <div id="edet-reportes-container">
      <p style="padding:12px;">Cargando reportes...</p>
    </div>
  </section>

</main>

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- JS -->
<script type="module" src="../src/js/edet-dashboard.js"></script>

</body>
</html>
