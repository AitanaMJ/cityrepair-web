<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión EDET • CityRepair</title>

  <link rel="stylesheet" href="../src/css/styles.css">
  <link rel="stylesheet" href="../src/css/edet-dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<header class="edet-navbar">
  <div class="edet-navbar-brand">
    <div class="avatar-sm">E</div>
    <div class="brand-txt">
      <span class="brand-title">CityRepair</span>
      <span class="brand-sub">Panel de Gestión EDET</span>
    </div>
  </div>
  <button class="btn-logout" onclick="cerrarSesion()">
    🚪 Cerrar sesión
  </button>
</header>

<main class="container edash">

  <h1 class="edash-title">Panel de Gestión EDET</h1>

  <!-- KPIs -->
  <section class="edash-kpis">
    <article class="kpi">
      <div class="kpi-num" id="kpiTotal">0</div>
      <div class="kpi-sub">Total Reportes</div>
    </article>
    <article class="kpi">
      <div class="kpi-num kpi-num--green" id="kpiOk">0</div>
      <div class="kpi-sub">Resueltos</div>
    </article>
    <article class="kpi">
      <div class="kpi-num kpi-num--blue" id="kpiReview">0</div>
      <div class="kpi-sub">En Revisión</div>
    </article>
    <article class="kpi">
      <div class="kpi-num kpi-num--red" id="kpiHigh">0</div>
      <div class="kpi-sub">Alta Prioridad</div>
    </article>
  </section>

  <!-- FILTROS -->
  <section class="card" style="margin-top:20px; padding:16px;">
    <header class="card-head">Filtros Avanzados</header>

    <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:end; margin-top:12px;">

      <div>
        <label>Estado de resolución</label>
        <select id="filtroResolucion" class="select">
          <option value="todos">Todos</option>
          <option value="resuelto">Solo resueltos</option>
          <option value="no_resuelto">Solo no resueltos</option>
        </select>
      </div>

      <div>
        <label>Prioridad</label>
        <select id="filtroPrioridad" class="select">
          <option value="todos">Todas</option>
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>

      <div>
        <label>Tipo de problema</label>
        <select id="filtroTipo" class="select">
          <option value="todos">Todos</option>
          <option value="corte-total">Corte total</option>
          <option value="corte-parcial">Corte parcial</option>
          <option value="cable-caido">Cable caído</option>
          <option value="medidor-quemado">Medidor quemado</option>
          <option value="baja-tension">Baja tensión</option>
          <option value="poste-danado">Poste dañado</option>
          <option value="transformador-riesgo">Transformador en riesgo</option>
        </select>
      </div>

      <div>
        <label>Ciudad / Zona</label>
        <select id="filtroZona" class="select">
          <option value="todos">Todas</option>
        </select>
      </div>

      <div>
        <label>Fecha desde</label>
        <input type="date" id="fechaDesde" class="select">
      </div>

      <div>
        <label>Fecha hasta</label>
        <input type="date" id="fechaHasta" class="select">
      </div>

      <div style="display:flex; gap:8px;">
        <button id="btnAplicarFiltros" class="btn-primary">
          Aplicar filtros
        </button>

        <button id="btnLimpiarFiltros" class="btn-secondary">
          Limpiar filtros
        </button>

        <button id="btnExportarPDF" class="btn-primary">
          Exportar PDF
        </button>
      </div>

    </div>
  </section>

  <!-- GRÁFICOS -->
  <section class="edash-charts">
    <article class="card">
      <header class="card-head">Estado de Reportes</header>
      <div class="chart-wrapper">
        <canvas id="chartStatus"></canvas>
      </div>
    </article>

    <article class="card">
      <header class="card-head">Reportes por Zona</header>
      <div class="chart-wrapper">
        <canvas id="chartZones"></canvas>
      </div>
    </article>
  </section>

  <!-- LISTADO -->
  <section class="card">
    <header class="card-head">Listado de Reportes</header>
    <div id="edet-reportes-container">
      <p style="padding:12px;">Cargando reportes...</p>
    </div>
  </section>

</main>

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- JS -->
<script type="module" src="../src/js/edet-dashboard.js"></script>

</body>
</html>
