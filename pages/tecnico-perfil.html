<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil del Técnico – CityRepair</title>
  <link rel="stylesheet" href="../src/css/styles.css">
  <link rel="stylesheet" href="../src/css/tecnico-dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container">
    <div class="brand-left">
      <img src="../src/img/favicon.png" class="logo-sm" alt="CityRepair">
      <div class="brand-txt">
        <span class="brand-title">CityRepair</span>
        <span class="brand-sub">Panel del Técnico</span>
      </div>
    </div>
    <nav class="nav-right">
      <a href="./Tecnico-dashboard.html" class="btn-mis-trabajos">
        <i class="bi bi-tools"></i> Mis trabajos
      </a>
      <div class="nav-item user-pill" id="userMenuBtn" data-user-panel hidden>
        <div class="avatar-sm" data-user-avatar>?</div>
        <span data-user-name>Técnico</span>
        <i class="bi bi-caret-down-fill icon-dropdown"></i>
        <div class="user-dropdown" id="userDropdown" hidden>
          <a href="./tecnico-perfil.html" class="dropdown-btn">
            <i class="bi bi-person-circle"></i> Mi Perfil
          </a>
          <button id="logoutFromMenu">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
          </button>
        </div>
      </div>
    </nav>
  </div>
  <div class="navbar-divider"></div>
</header>

<!-- CONTENIDO PRINCIPAL -->
<main class="perfil-tec-main">

  <!-- HERO CARD -->
  <div class="perfil-hero-card">
    <div class="perfil-hero-banner"></div>
    <div class="perfil-hero-body">
      <div class="perfil-avatar-wrapper">
        <div class="perfil-avatar-circle" id="perfilAvatar">T</div>
        <span class="perfil-status-dot"></span>
      </div>
      <div class="perfil-hero-info">
        <h1 id="perfilNombre" class="perfil-hero-name">—</h1>
        <p id="perfilEmail" class="perfil-hero-email">—</p>
        <div class="perfil-hero-tags">
          <span class="perfil-tag perfil-tag--blue">
            <i class="bi bi-wrench-adjustable"></i> Técnico
          </span>
          <span class="perfil-tag perfil-tag--green">
            <i class="bi bi-circle-fill" style="font-size:0.55rem"></i> Activo
          </span>
          <span class="perfil-tag perfil-tag--gray">
            <i class="bi bi-building"></i> EDET
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="perfil-stats-row">
    <div class="perfil-stat-card">
      <div class="perfil-stat-icon" style="background:#dbeafe; color:#1d4ed8">
        <i class="bi bi-clipboard-check"></i>
      </div>
      <div>
        <p class="perfil-stat-label">Asignados</p>
        <p class="perfil-stat-num" id="statAsignados">—</p>
      </div>
    </div>
    <div class="perfil-stat-card">
      <div class="perfil-stat-icon" style="background:#fef3c7; color:#d97706">
        <i class="bi bi-arrow-repeat"></i>
      </div>
      <div>
        <p class="perfil-stat-label">En revisión</p>
        <p class="perfil-stat-num" id="statRevision">—</p>
      </div>
    </div>
    <div class="perfil-stat-card">
      <div class="perfil-stat-icon" style="background:#dcfce7; color:#16a34a">
        <i class="bi bi-check-circle"></i>
      </div>
      <div>
        <p class="perfil-stat-label">Resueltos</p>
        <p class="perfil-stat-num" id="statResueltos">—</p>
      </div>
    </div>
  </div>

  <!-- INFORMACIÓN PERSONAL -->
  <div class="perfil-info-card">
    <h2 class="perfil-section-title">
      <i class="bi bi-person-lines-fill"></i> Información de la cuenta
    </h2>
    <div class="perfil-info-grid">
      <div class="perfil-info-item">
        <span class="perfil-info-label"><i class="bi bi-person"></i> Nombre</span>
        <span class="perfil-info-val" id="infoNombre">—</span>
      </div>
      <div class="perfil-info-item">
        <span class="perfil-info-label"><i class="bi bi-envelope"></i> Email</span>
        <span class="perfil-info-val" id="infoEmail">—</span>
      </div>
      <div class="perfil-info-item">
        <span class="perfil-info-label"><i class="bi bi-shield-check"></i> Rol</span>
        <span class="perfil-info-val">Técnico de campo</span>
      </div>
      <div class="perfil-info-item">
        <span class="perfil-info-label"><i class="bi bi-building"></i> Organización</span>
        <span class="perfil-info-val">EDET S.A.</span>
      </div>
      <div class="perfil-info-item">
        <span class="perfil-info-label"><i class="bi bi-hash"></i> ID de sesión</span>
        <span class="perfil-info-val perfil-info-muted" id="infoUid">—</span>
      </div>
    </div>
  </div>

  <!-- ACCIONES RÁPIDAS -->
  <div class="perfil-acciones-card">
    <h2 class="perfil-section-title">
      <i class="bi bi-lightning-charge"></i> Acciones rápidas
    </h2>
    <div class="perfil-acciones-grid">
      <a href="./Tecnico-dashboard.html" class="perfil-accion-btn perfil-accion-btn--primary">
        <i class="bi bi-tools"></i>
        <span>Ver mis reportes</span>
      </a>
      <button id="btnLogoutPerfil" class="perfil-accion-btn perfil-accion-btn--danger">
        <i class="bi bi-box-arrow-right"></i>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </div>

</main>

<script type="module" src="../src/js/navbar-auth.js"></script>
<script type="module" src="../src/js/profile-menu.js"></script>
<script type="module" src="../src/js/logout.js"></script>
<script type="module" src="../src/js/perfil-tecnico.js"></script>

</body>
</html>
