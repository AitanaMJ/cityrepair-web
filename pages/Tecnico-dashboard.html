<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityRepair – Panel del Técnico</title>

  <link rel="stylesheet" href="../src/css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../src/css/tecnico-dashboard.css">
</head>

<body>

<header class="navbar">
  <div class="container">

    <div class="brand-left">
      <img src="../src/img/favicon.png" class="logo-sm">
      <div class="brand-txt">
        <span class="brand-title">CityRepair</span>
        <span class="brand-sub">Panel del Técnico</span>
      </div>
    </div>

    <nav class="nav-right">
      <a class="nav-item active">
        <i class="bi bi-tools"></i> Mis trabajos
      </a>

      <div class="nav-item user-pill" id="userMenuBtn" hidden>
        <img class="avatar-sm" data-user-avatar src="">
        <span data-user-name>Técnico</span>
      </div>
    </nav>

  </div>
</header>

<main class="container edet-main">

  <!-- KPIs -->
  <section class="kpi-row">
    <article class="kpi-card">
      <h3>Asignados</h3>
      <p id="kpiAsignados">0</p>
    </article>

    <article class="kpi-card">
      <h3>En revisión</h3>
      <p id="kpiRevision">0</p>
    </article>

    <article class="kpi-card">
      <h3>Resueltos</h3>
      <p id="kpiResueltos">0</p>
    </article>
  </section>

  <!-- 🔥 FILTROS -->
  <section class="card" style="margin-bottom:20px;">
    <div style="display:flex; gap:10px; flex-wrap:wrap;">

      <select id="filtro-estado">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="revision">En revisión</option>
        <option value="resuelto">Resuelto</option>
      </select>

      <select id="filtro-zona">
        <option value="">Todas las zonas</option>
        <option value="Norte">Norte</option>
        <option value="Sur">Sur</option>
        <option value="Centro">Centro</option>
      </select>

      <select id="filtro-prioridad">
        <option value="">Todas las prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>

    </div>
  </section>

  <!-- LISTA -->
  <section class="card">
    <h2>Mis reportes asignados</h2>

    <div id="lista-tecnico"></div>
  </section>

</main>

<script src="../src/js/tecnico-dashboard.js"></script>

</body>
</html>
